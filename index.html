<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Show Project | Kayanat Suleman (KayanatSuleman)</title>
    <link href="style.css" rel="stylesheet" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  </head>

  <body>
    <header class="page-header">
      <h1>TV Show Project | Kayanat Suleman (KayanatSuleman)</h1>
      <p id="episode-count"></p>
    </header>

    <main>
      <section id="shows-view">
        <div class="controls">
          <label for="show-search">Search shows:</label>
          <input
            type="text"
            id="show-search"
            placeholder="Search by show name, genre, or summary"
          />
          <p id="show-count"></p>
        </div>

        <div id="shows-root"></div>
      </section>

      <section id="episodes-view" class="hidden">
        <div class="controls">
          <button id="back-button" type="button">Back to shows</button>

          <label for="show-selector">Choose a show:</label>
          <select id="show-selector"></select>

          <label for="episode-search">Search episodes:</label>
          <input
            type="text"
            id="episode-search"
            placeholder="Search by episode name or summary"
          />

          <label for="episode-select">Choose an episode:</label>
          <select id="episode-select">
            <option value="all">All Episodes</option>
          </select>
        </div>

        <div id="episodes-root"></div>
      </section>
    </main>

    <footer class="page-footer">
      <p>
        Data originally from
        <a href="https://tvmaze.com/" target="_blank" rel="noopener noreferrer"
          >TVMaze.com</a
        >
      </p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
